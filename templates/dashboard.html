<!DOCTYPE html>
<html>
<head>
<title>SHIDS Dashboard</title>

<meta http-equiv="refresh" content="3">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* Header */
h1 {
    font-weight: bold;
    text-shadow: 0px 0px 10px #00f2ff;
}

/* Cards */
.card {
    border-radius: 15px;
    transition: 0.3s;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.6);
}

.card:hover {
    transform: translateY(-5px) scale(1.05);
}

/* Stats colors */
.total {
    background: linear-gradient(45deg, #6a11cb, #2575fc);
}

.attack {
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
}

.normal {
    background: linear-gradient(45deg, #00c853, #64dd17);
}

/* Chart box */
.chart-box {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 20px;
    backdrop-filter: blur(10px);
}

/* Buttons */
.btn-custom {
    border-radius: 25px;
    padding: 10px 25px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">📊 SHIDS Analytics Dashboard</h1>

<!-- 🔥 STAT CARDS -->
<div class="row text-white">

    <div class="col-md-4">
        <div class="card total p-4 text-center">
            <h4>Total Traffic</h4>
            <h1>{{ total }}</h1>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card attack p-4 text-center">
            <h4>🚨 Attacks</h4>
            <h1>{{ attacks }}</h1>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card normal p-4 text-center">
            <h4>✅ Normal</h4>
            <h1>{{ normal }}</h1>
        </div>
    </div>

</div>

<!-- 📊 CHART SECTION -->
<div class="chart-box mt-5 text-center">
    <h4>📈 Traffic Distribution</h4>

    <img src="{{ url_for('static', filename='chart.png') }}" 
         class="img-fluid mt-3" 
         style="max-height:400px;">
</div>

<!-- 🔘 BUTTONS -->
<div class="text-center mt-4">
    <a href="/" class="btn btn-light btn-custom">🏠 Home</a>
    <a href="/live" class="btn btn-warning btn-custom">🚀 Live Detection</a>
</div>

</div>

</body>
</html>
