<!DOCTYPE html>
<html>
<head>
<title>Live Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    font-weight: bold;
}

.card {
    border-radius: 15px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
}

.status-box {
    font-size: 28px;
    padding: 15px;
    border-radius: 10px;
    font-weight: bold;
}

.normal {
    background: #28a745;
}

.attack {
    background: #dc3545;
}

.table {
    border-radius: 10px;
    overflow: hidden;
}

.table-danger {
    background-color: #ff4d4d !important;
}

.table-success {
    background-color: #28a745 !important;
}

.btn-custom {
    border-radius: 20px;
    padding: 10px 25px;
}
</style>

<script>
let lastAlert = "";
let lastAttackTime = "None";

async function loadLogs() {
    let response = await fetch('/logs');
    let data = await response.json();

    let table = document.getElementById("logTable");
    table.innerHTML = "";

    let latest = "Waiting...";
    let isAttackLatest = false;

    data.slice().reverse().forEach((log, index) => {

        let isAttack = log.result.includes("Attack");
        let color = isAttack ? "table-danger" : "table-success";

        let row = `<tr class="${color}">
            <td>${log.result}</td>
            <td>${log.packet}</td>
        </tr>`;

        table.innerHTML += row;

        if (index === 0) {
            latest = log.result;
            isAttackLatest = isAttack;
        }

        // 🚨 Alert once
        if (isAttack && lastAlert !== log.packet) {
            alert("🚨 Intrusion Detected!");
            lastAlert = log.packet;
            lastAttackTime = new Date().toLocaleTimeString();
        }
    });

    // 🔥 Update status UI
    let statusBox = document.getElementById("liveStatus");

    statusBox.innerText = latest;

    if (isAttackLatest) {
        statusBox.className = "status-box attack text-center";
    } else {
        statusBox.className = "status-box normal text-center";
    }

    document.getElementById("lastAttack").innerText = lastAttackTime;
}

setInterval(loadLogs, 2000);
</script>

</head>

<body>

<div class="container mt-4">

<h1 class="text-center mb-4">🚀 SHIDS Real-Time Intrusion Detection</h1>

<!-- 🔥 STATUS CARD -->
<div class="card p-4 text-center mb-4">
    <h4>Current Status</h4>
    <div id="liveStatus" class="status-box normal">Waiting...</div>

    <p class="mt-3 text-warning">
        Last Attack: <span id="lastAttack">None</span>
    </p>
</div>

<!-- 📋 PACKET TABLE -->
<div class="card p-4">
    <h4>📡 Live Packet Logs</h4>

    <div style="max-height:400px; overflow-y:auto;">
        <table class="table table-dark table-striped mt-3">
            <thead>
                <tr>
                    <th>Result</th>
                    <th>Packet Info</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<!-- 🔙 BACK BUTTON -->
<div class="text-center mt-4">
    <a href="/" class="btn btn-light btn-custom">⬅ Back</a>
</div>

</div>

</body>
</html>
