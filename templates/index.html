<!DOCTYPE html>
<html>
<head>
<title>SHIDS Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}
.card {
    border-radius: 15px;
}
</style>

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">🚀 SHIDS Intrusion Detection</h1>

    <!-- Stats Row -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card bg-success p-3">
                <h5>Normal Traffic</h5>
                <h2>✔️ Safe</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-danger p-3">
                <h5>Attack Detection</h5>
                <h2>🚨 Alert</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-warning p-3">
                <h5>Status</h5>
                <h2>Active</h2>
            </div>
        </div>
    </div>

    <!-- Input Form -->
    <div class="card p-4 bg-dark shadow-lg">
        <h4 class="text-center">Enter Network Data</h4>

        <form action="/predict" method="post">
            <input class="form-control mt-3" name="duration" placeholder="Duration" required>
            <input class="form-control mt-3" name="src_bytes" placeholder="Source Bytes" required>
            <input class="form-control mt-3" name="dst_bytes" placeholder="Destination Bytes" required>

            <button class="btn btn-primary mt-4 w-100">🔍 Detect Intrusion</button>
        </form>
    </div>

    <!-- Result -->
    {% if prediction %}
    <div class="alert alert-light text-dark mt-4 text-center">
        <h2>{{ prediction }}</h2>
    </div>
    {% endif %}

    <!-- Buttons -->
    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-success">📊 View Analytics</a>
    </div>

</div>

</body>
</html>
